# =============================================================================
# goods_db 服务器配置文件
# =============================================================================
# 该文件使用 INI 风格格式。以 '#' 或 ';' 开头的行是注释。
# 命令行参数会覆盖此配置文件中的设置。
#
# 位置: /etc/goods_db/goods_db.conf
# =============================================================================

# -----------------------------------------------------------------------------
# 基本配置
# -----------------------------------------------------------------------------

# 服务器监听地址。使用 0.0.0.0 监听所有网络接口，127.0.0.1 仅本地访问。
bind_address = 0.0.0.0

# 服务器监听端口。默认 3307（避免与 MySQL 默认端口 3306 冲突）。
port = 3307

# 数据存储目录。所有数据库文件、日志文件和元数据都存储在此目录下。
# 生产环境建议使用独立磁盘分区，如 /var/lib/goods_db/data。
datadir = ./data

# PID 文件路径。用于 process management 和健康检查。
pid_file = goods_db.pid

# -----------------------------------------------------------------------------
# 线程池配置
# -----------------------------------------------------------------------------

# 工作线程数。0 表示自动检测（= CPU 核心数）。
# 纯 I/O 密集型负载可用 CPU 核心数 × 2；
# 纯 CPU 密集型负载保持与 CPU 核心数相同。
thread_pool_size = 0

# 最大并发客户端连接数。超过此限制后新的连接请求将被拒绝。
max_connections = 200

# 连接空闲超时（秒）。空闲超过此时间的连接会被服务器主动关闭。
# 默认 28800 秒（8 小时），与 MySQL 一致。
connection_timeout = 28800

# -----------------------------------------------------------------------------
# 缓冲池配置
# -----------------------------------------------------------------------------

# Buffer Pool 页数。每页固定 16KB，总内存 = 页数 × 16KB。
# 建议设置为可用物理内存的 50%–70%。
# 例如: buffer_pool_size = 64000 → 约 1GB
buffer_pool_size = 100

# -----------------------------------------------------------------------------
# 日志配置
# -----------------------------------------------------------------------------

# 错误日志文件路径。服务器启动错误、运行时错误、认证失败等记录在此。
# 特殊值: stderr（仅输出到 stderr）
log_error = goods_db_error.log

# 查询日志文件路径。记录所有执行的 SQL 查询。
# 生产环境若性能敏感可设置为空字符串 ("") 禁用。
log_query = goods_db_query.log

# 二进制日志 (binlog) 文件名前缀。实际文件名格式: {prefix}.{seq_number}
# 例如: goods_db_binlog.000001, goods_db_binlog.000002, ...
log_binlog_prefix = goods_db_binlog

# 错误日志过滤级别。可选: DEBUG, INFO, WARN, ERROR, FATAL
# 生产环境建议设置为 WARN 以减少磁盘 I/O。
log_error_level = INFO

# binlog 单个文件最大大小（字节）。超过此大小自动轮转。
# 默认 1073741824 (1GB)。最小值 4096 (4KB)。
max_binlog_size = 1073741824

# 查询日志单个文件最大大小（字节）。超过此大小自动轮转。
# 默认 104857600 (100MB)。设置为 0 可禁用查询日志。
max_querylog_size = 104857600

# binlog 自动清理保留天数。过期的 binlog 文件会自动删除。
# 设置为 0 表示永不过期（需手动 PURGE BINARY LOGS）。
binlog_expire_days = 7

# -----------------------------------------------------------------------------
# 安全配置
# -----------------------------------------------------------------------------

# 同一 IP 连续认证失败的最大次数。超过后该 IP 会被暂时封锁。
max_auth_failures = 10

# IP 封锁持续时间（秒）。封锁期满后自动解除。
auth_block_duration = 300

# 是否要求客户端使用安全传输（TLS/SSL）。
require_secure_transport = false

# -----------------------------------------------------------------------------
# 事务与并发控制配置
# -----------------------------------------------------------------------------

# 锁等待超时（毫秒）。事务等待行锁/表锁超过此时间会失败并回滚。
# 默认 30000 (30 秒)。交易类场景可设置较低值（如 5000）。
lock_wait_timeout = 30000

# 事务最大持续时间（秒）。超过此时间的事务会被自动回滚。
# 设置为 0 表示不限制。用于防止长时间运行的事务阻塞其他操作。
max_txn_duration = 0

# 默认事务隔离级别。可选:
#   READ UNCOMMITTED — 最低隔离，允许脏读
#   READ COMMITTED — 不允许脏读，推荐 OLTP 默认
#   REPEATABLE READ — 不允许不可重复读
#   SERIALIZABLE   — 最高隔离，防止幻读
default_isolation_level = READ COMMITTED

# XID 持久化文件路径。用于事务 ID 持久化，确保服务器重启后 XID 继续递增。
xid_persist_file = goods_db_xid.dat

# XID 持久化间隔。每分配 N 个事务 ID 后写入磁盘一次。
# 较小的值提供更好的持久性，但增加磁盘 I/O。
xid_persist_interval = 1000

# -----------------------------------------------------------------------------
# 网络配置
# -----------------------------------------------------------------------------

# TCP 连接队列最大长度。影响高并发场景下的连接建立速度。
tcp_backlog = 128

# 网络读取超时（秒）。客户端在此时间内无数据发送则断开连接。
net_read_timeout = 30

# 网络写入超时（秒）。向客户端发送数据超过此时间则断开连接。
net_write_timeout = 60

# 是否禁用 Nagle 算法（TCP_NODELAY）。
# true = 禁用 Nagle（低延迟，推荐）；false = 启用 Nagle（减少小包数量）。
tcp_nodelay = true
