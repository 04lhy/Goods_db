// ===========================================================================
// Export CSV
// ===========================================================================
function exportCSV() {
  if (!state.currentRows.length) { alert('没有数据可以导出。'); return; }
  var header = state.columns.map(function(c) { return csvEscape(c.name); }).join(',');
  var body = state.currentRows.map(function(row) {
    return row.map(function(cell) {
      return cell === null || cell === undefined ? 'NULL' : csvEscape(String(cell));
    }).join(',');
  }).join('\n');
  var csv = header + '\n' + body;
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'export_' + (state.currentTable || 'data') + '_' +
    new Date().toISOString().slice(0,19).replace(/[:]/g,'-') + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function csvEscape(s) {
  if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

// ---- Export JSON ----
function exportJSON() {
  if (!state.currentRows.length) { alert('没有数据可以导出。'); return; }
  var header = state.columns.map(function(c) { return c.name; });
  var data = state.currentRows.map(function(row) {
    var obj = {};
    header.forEach(function(h, i) { obj[h] = (i < row.length) ? row[i] : null; });
    return obj;
  });
  var json = JSON.stringify(data, null, 2);
  downloadBlob(json, 'application/json',
    'export_' + (state.currentTable || 'data') + '_' +
    new Date().toISOString().slice(0,19).replace(/[:]/g,'-') + '.json');
}

// ---- Export SQL INSERT ----
function exportSQLInsert() {
  if (!state.currentRows.length) { alert('没有数据可以导出。'); return; }
  var tblName = qualifiedTable(state.currentDb, state.currentTable);
  var colNames = state.columns.map(function(c) { return quoteId(c.name); }).join(', ');
  var lines = [];
  lines.push('-- Generated by goods_db_studio');
  lines.push('-- Table: ' + tblName);
  lines.push('-- Rows: ' + state.currentRows.length);
  lines.push('');
  state.currentRows.forEach(function(row) {
    var vals = row.map(function(cell, i) {
      if (cell === null || cell === undefined) return 'NULL';
      var col = i < state.columns.length ? state.columns[i] : null;
      if (col && isNumericType(col.type_name)) {
        if (String(cell).trim() === '') return 'NULL';
        var n = parseFloat(cell);
        if (!isNaN(n) && isFinite(n)) return String(n);
      }
      return "'" + escapeSqlStr(String(cell)) + "'";
    });
    lines.push('INSERT INTO ' + tblName + ' (' + colNames + ') VALUES (' + vals.join(', ') + ');');
  });
  downloadBlob(lines.join('\n'), 'text/plain',
    'export_' + (state.currentTable || 'data') + '_' +
    new Date().toISOString().slice(0,19).replace(/[:]/g,'-') + '.sql');
}

function downloadBlob(content, mime, filename) {
  var blob = new Blob([content], { type: mime + ';charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ---- Export dropdown menu ----
function setupExportMenu() {
  var exportBtn = $('btn-export');
  var exportMenu = $('export-menu');
  exportBtn.onclick = function(e) {
    e.stopPropagation();
    exportMenu.style.display = exportMenu.style.display === 'none' ? 'block' : 'none';
  };
  exportMenu.querySelectorAll('.ctx-item').forEach(function(item) {
    item.onclick = function(e) {
      e.stopPropagation();
      exportMenu.style.display = 'none';
      var fmt = item.dataset.fmt;
      if (fmt === 'csv') exportCSV();
      else if (fmt === 'json') exportJSON();
      else if (fmt === 'sql') exportSQLInsert();
    };
  });
  document.addEventListener('click', function() { exportMenu.style.display = 'none'; });
}

// ===========================================================================
// Multi-tab SQL Editor
// ===========================================================================
function setupContentTabs() {
  $('content-tabs').style.display = 'flex';
  $('btn-new-sql-tab').onclick = newSqlTab;
  // Click tab handler
  $('content-tab-list').addEventListener('click', function(e) {
    var tab = e.target.closest('.content-tab');
    if (!tab) return;
    if (e.target.classList.contains('tab-close')) {
      e.stopPropagation();
      closeSqlTab(tab.dataset.sqlTab);
      return;
    }
    activateTab(tab.dataset.tab);
  });
  activateTab('data');
}

function newSqlTab() {
  var tabId = state.nextSqlTabId++;
  var tabLabel = 'SQL ' + tabId;
  state.sqlTabs.push({ id: tabId, label: tabLabel, sql: '', result: null });

  var tabEl = document.createElement('div');
  tabEl.className = 'content-tab';
  tabEl.dataset.tab = 'sql' + tabId;
  tabEl.dataset.sqlTab = tabId;
  tabEl.innerHTML = '<span>💻 ' + tabLabel + '</span>' +
    '<span class="tab-close" title="关闭标签">✕</span>';
  $('content-tab-list').appendChild(tabEl);
  activateTab('sql' + tabId);
}

function closeSqlTab(tabId) {
  var idx = -1;
  for (var i = 0; i < state.sqlTabs.length; i++) {
    if (state.sqlTabs[i].id === parseInt(tabId)) { idx = i; break; }
  }
  if (idx < 0) return;
  state.sqlTabs.splice(idx, 1);

  var tabEl = $('content-tab-list').querySelector('[data-sql-tab="' + tabId + '"]');
  if (tabEl) tabEl.remove();

  if (state.activeSqlTab === parseInt(tabId)) {
    // Switch to next SQL tab or data tab
    if (state.sqlTabs.length > 0) {
      var next = state.sqlTabs[Math.min(idx, state.sqlTabs.length - 1)];
      activateTab('sql' + next.id);
    } else {
      activateTab('data');
    }
  }
}

function activateTab(tabName) {
  // Update tab styling
  $('content-tab-list').querySelectorAll('.content-tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.tab === tabName);
  });

  var isData = tabName === 'data';
  $('table-header').style.display = isData ? 'flex' : 'none';
  $('toolbar').style.display = isData ? 'flex' : 'none';
  $('filter-panel').classList.remove('visible');
  $('sql-editor-area').style.display = isData ? 'none' : 'flex';
  $('pagination').style.display = isData ? 'flex' : 'none';

  if (!isData) {
    var sqlTabId = parseInt(tabName.replace('sql', ''));
    state.activeSqlTab = sqlTabId;
    var tab = findSqlTab(sqlTabId);
    if (tab) {
      $('sql-editor-text').value = tab.sql || '';
      showSqlResult(tab.result);
    }
  } else {
    state.activeSqlTab = -1;
    // Show data table if we have a current table
    if (state.currentTable) {
      dataTable.style.display = '';
      emptyState.style.display = 'none';
    } else {
      dataTable.style.display = 'none';
      emptyState.style.display = 'flex';
    }
  }
}

function findSqlTab(id) {
  for (var i = 0; i < state.sqlTabs.length; i++) {
    if (state.sqlTabs[i].id === id) return state.sqlTabs[i];
  }
  return null;
}

function saveCurrentSql() {
  if (state.activeSqlTab < 0) return;
  var tab = findSqlTab(state.activeSqlTab);
  if (tab) tab.sql = $('sql-editor-text').value;
}

// ---- SQL Execution ----
function executeSQLFromEditor() {
  saveCurrentSql();
  var sql = $('sql-editor-text').value.trim();
  if (!sql) { $('sql-status').textContent = '没有 SQL 语句'; return; }

  $('sql-status').textContent = '执行中...';
  $('sql-status').style.color = 'var(--warning)';
  $('btn-sql-execute').disabled = true;

  // Save to history
  addToHistory(sql);

  executeSQL(sql).then(function(res) {
    $('btn-sql-execute').disabled = false;
    if (res.success) {
      $('sql-status').textContent = res.columns.length + ' 列, ' +
        (res.rows ? res.rows.length : 0) + ' 行' +
        (res.exec_time_ms !== undefined ? ' — ' + res.exec_time_ms + ' ms' : '');
      $('sql-status').style.color = 'var(--success)';
    } else {
      $('sql-status').textContent = '错误: ' + (res.error || '未知');
      $('sql-status').style.color = 'var(--danger)';
    }
    showSqlResult(res);
    if (state.activeSqlTab >= 0) {
      var tab = findSqlTab(state.activeSqlTab);
      if (tab) tab.result = res;
    }
  }).catch(function(e) {
    $('btn-sql-execute').disabled = false;
    $('sql-status').textContent = '网络错误: ' + e.message;
    $('sql-status').style.color = 'var(--danger)';
  });
}

function showSqlResult(res) {
  var tableWrap = $('sql-result-table-wrap');
  var msg = $('sql-result-message');
  tableWrap.innerHTML = '';
  msg.textContent = '';

  if (!res) {
    $('sql-result-area').style.display = 'none';
    return;
  }
  $('sql-result-area').style.display = 'flex';

  if (!res.success) {
    msg.textContent = '❌ ' + (res.error || '查询失败');
    msg.style.color = 'var(--danger)';
    return;
  }

  if (res.affected_rows !== undefined && res.columns.length === 0) {
    msg.textContent = '✓ 查询成功 — ' + res.affected_rows + ' 行受影响' +
      (res.exec_time_ms !== undefined ? ' (' + res.exec_time_ms + ' ms)' : '');
    msg.style.color = 'var(--success)';
    return;
  }

  if (!res.columns || !res.rows) {
    msg.textContent = '✓ 查询成功' +
      (res.exec_time_ms !== undefined ? ' (' + res.exec_time_ms + ' ms)' : '');
    msg.style.color = 'var(--success)';
    return;
  }

  msg.textContent = res.columns.length + ' 列, ' + res.rows.length + ' 行' +
    (res.exec_time_ms !== undefined ? ' (' + res.exec_time_ms + ' ms)' : '');
  msg.style.color = 'var(--success)';

  // Render result table
  var tbl = document.createElement('table');
  tbl.style.cssText = 'width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;table-layout:auto;';

  var thead = document.createElement('thead');
  var tr = document.createElement('tr');
  res.columns.forEach(function(col) {
    var th = document.createElement('th');
    th.style.cssText = 'background:var(--bg2);padding:5px 10px;text-align:left;border-bottom:2px solid var(--accent);white-space:nowrap;position:sticky;top:0;z-index:2;';
    th.textContent = col.name;
    th.title = col.name + (col.type_name ? ' (' + col.type_name + ')' : '');
    tr.appendChild(th);
  });
  thead.appendChild(tr);
  tbl.appendChild(thead);

  // Use fixed layout for wider result sets (>=4 columns) for proper alignment
  var useFixed = res.columns.length >= 4;
  if (useFixed) {
    tbl.style.tableLayout = 'fixed';
  }

  var tbody = document.createElement('tbody');
  var maxRows = Math.min(res.rows.length, 1000);
  for (var r = 0; r < maxRows; r++) {
    var row = res.rows[r];
    var tr2 = document.createElement('tr');
    row.forEach(function(cell, c) {
      var td = document.createElement('td');
      var cellStyle = 'padding:3px 10px;border-bottom:1px solid var(--border);';
      if (useFixed) {
        cellStyle += 'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
      }
      td.style.cssText = cellStyle;
      if (cell === null || cell === undefined) {
        td.innerHTML = '<span class="null">(NULL)</span>';
      } else {
        td.textContent = cell;
        if (useFixed) td.title = String(cell);
      }
      tr2.appendChild(td);
    });
    if (r % 2 === 1) tr2.style.backgroundColor = 'rgba(255,255,255,0.015)';
    tbody.appendChild(tr2);
  }
  tbl.appendChild(tbody);

  if (res.rows.length > 1000) {
    msg.textContent += ' (显示前 1000 行)';
  }

  tableWrap.appendChild(tbl);
}

// ===========================================================================
// Query History (localStorage, last 50 items)
// ===========================================================================
var HISTORY_KEY = 'goods_db_query_history';
var MAX_HISTORY = 50;

function loadHistory() {
  try {
    var saved = JSON.parse(localStorage.getItem(HISTORY_KEY));
    state.queryHistory = Array.isArray(saved) ? saved : [];
  } catch(e) { state.queryHistory = []; }
}

function saveHistory() {
  try {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(state.queryHistory));
  } catch(e) {}
}

function addToHistory(sql) {
  // Remove duplicates
  state.queryHistory = state.queryHistory.filter(function(h) { return h.sql !== sql; });
  state.queryHistory.unshift({
    sql: sql,
    time: new Date().toISOString(),
    host: state.host + ':' + state.port
  });
  if (state.queryHistory.length > MAX_HISTORY) state.queryHistory.length = MAX_HISTORY;
  saveHistory();
}

function showHistoryModal() {
  var body = $('modal-history-body');
  body.innerHTML = '';

  if (state.queryHistory.length === 0) {
    body.innerHTML = '<div class="history-empty">暂无查询历史</div>';
  } else {
    state.queryHistory.forEach(function(entry, idx) {
      var div = document.createElement('div');
      div.className = 'history-item';
      var sqlSpan = document.createElement('span');
      sqlSpan.className = 'h-sql';
      sqlSpan.textContent = entry.sql;
      sqlSpan.title = entry.sql;
      var timeSpan = document.createElement('span');
      timeSpan.className = 'h-time';
      var d = new Date(entry.time);
      timeSpan.textContent = d.toLocaleString();
      div.appendChild(sqlSpan);
      div.appendChild(timeSpan);
      div.onclick = function() {
        $('sql-editor-text').value = entry.sql;
        closeModal('modal-history');
        // Switch to a SQL tab if not already active
        if (state.activeSqlTab < 0) {
          if (state.sqlTabs.length === 0) newSqlTab();
          else activateTab('sql' + state.sqlTabs[state.sqlTabs.length - 1].id);
        }
      };
      body.appendChild(div);
    });
  }
  $('modal-history').classList.add('visible');
}

function clearHistory() {
  state.queryHistory = [];
  saveHistory();
  showHistoryModal();
}

    e.preventDefault();
    if (state.activeSqlTab >= 0) {
      executeSQLFromEditor();
    } else {
      refreshTable();
    }
  }
  // Ctrl+Enter: execute SQL in editor
  if (e.ctrlKey && e.key === 'Enter') {
    e.preventDefault();
    if (state.activeSqlTab >= 0) executeSQLFromEditor();
  }
  if (e.ctrlKey && e.key === 'f' && state.activeSqlTab < 0) { e.preventDefault(); toggleFilterPanel(); }
  if (e.ctrlKey && e.key === 'n' && state.activeSqlTab < 0) { e.preventDefault(); showInsertModal(); }
  if (e.ctrlKey && e.key === 't') { e.preventDefault(); newSqlTab(); }
});
